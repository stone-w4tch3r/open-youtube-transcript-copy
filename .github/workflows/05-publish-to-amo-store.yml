name: Publish to AMO Store (Listed)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Sign and submit to AMO (listed)
        run: npm run sign:with-listing
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      - name: Upload signed .xpi artifact
        uses: actions/upload-artifact@v7
        with:
          name: open-youtube-transcript-copy-signed-listed
          path: dist/*.xpi

name: Sync Upstream AMO Package and Open Update PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update extracted source from AMO
        run: npm run sync:local

      - name: Detect generated changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream package changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream package changes detected."
          fi

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: npm test

      - name: Validate extension manifest
        if: steps.changes.outputs.changed == 'true'
        run: npm run validate-manifest

      - name: Build extension artifact
        if: steps.changes.outputs.changed == 'true'
        run: npm run build:no-validate-manifest

      - name: Show generated changes
        if: steps.changes.outputs.changed == 'true'
        run: git diff --stat

      - name: Create update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@271a8d0343b77ddcc4e342b45627b56daba735d4  # v8
        with:
          branch: automation/update-from-amo
          delete-branch: true
          title: Update extracted extension source from AMO
          commit-message: Update extracted extension source from AMO
          add-paths: |
            source/extension/**
            .mirror/amo.json
            README.md
            UPSTREAM.md
          body: |
            Automated AMO source extraction update.

            This PR was generated by running `npm run sync:local`, which downloads the latest AMO XPI, verifies the AMO SHA-256 hash, extracts source files, and regenerates provenance docs when upstream package metadata changes.

            After this PR is merged to `master`, the tag workflow will create the version tag from `source/extension/manifest.json`; the release workflow will publish the ZIP when that tag is pushed.

      - name: Upload extension artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: open-youtube-transcript-copy
          path: dist/*.zip

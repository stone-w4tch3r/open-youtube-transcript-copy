name: Create Version Tag After Master Update

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Read manifest version
        id: manifest
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('source/extension/manifest.json', 'utf8')).version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create release tag when missing
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.manifest.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$GITHUB_SHA"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created tag $TAG for $GITHUB_SHA."

      - name: Dispatch release workflow
        if: steps.tag.outputs.created == 'true'
        run: |
          gh workflow run "Publish to AMO Store and GitHub Release" \
            --ref "refs/tags/${{ steps.manifest.outputs.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

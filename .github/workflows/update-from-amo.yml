name: Update From AMO

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update extracted source from AMO
        run: npm run update:amo

      - name: Run tests
        run: npm test

      - name: Validate extension manifest
        run: npm run validate:manifest

      - name: Build extension artifact
        run: npm run build

      - name: Show generated changes
        run: git diff --stat

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-youtube-transcript-copy
          path: dist/*.zip

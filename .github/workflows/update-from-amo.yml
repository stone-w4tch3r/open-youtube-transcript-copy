name: Update From AMO

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update extracted source from AMO
        run: npm run update:amo

      - name: Run tests
        run: npm test

      - name: Validate extension manifest
        run: npm run validate:manifest

      - name: Build extension artifact
        run: npm run build

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/update-from-amo
          delete-branch: true
          title: Update extracted extension source from AMO
          commit-message: Update extracted extension source from AMO
          body: |
            Automated AMO source extraction update.

            This PR was generated by running `npm run update:amo`, which downloads the latest AMO XPI, verifies the AMO SHA-256 hash, extracts source files, and regenerates provenance docs.

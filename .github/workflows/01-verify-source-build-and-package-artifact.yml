name: Verify Source, Build, and Package Artifact

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate extension manifest
        run: npm run validate-manifest

      - name: Build extension artifact
        run: npm run build:no-validate-manifest

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: open-youtube-transcript-copy
          path: dist/*.zip
